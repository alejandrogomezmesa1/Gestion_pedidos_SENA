<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Eliminar Producto</title></head>
<body>
    {% include 'partials/navbar.html' %}
    <div class="page-wrapper">
        <h1>Eliminar Producto</h1>
        <div class="card">
            <p class="mb-4">¿Confirmas que deseas eliminar <strong>{{ producto.nombre_producto }}</strong>? Esta acción no se puede deshacer.</p>
            {% if error %}
                <div class="alert alert-danger" style="margin-bottom:16px;">{{ error }}</div>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="form-actions">
                    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                    <a href="{% url 'listar_productos' %}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
