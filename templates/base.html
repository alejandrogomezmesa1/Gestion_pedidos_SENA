<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestión de Pedidos{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/base.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</head>
<body>
    {% block navbar %}
    <header>
        {% include 'partials/navbar.html' %}
    </header>
    {% endblock %}
    <section class="container" style="margin-top:32px;">
        <div style="background:var(--card);border-radius:var(--radius-lg);box-shadow:var(--shadow-md);padding:32px 24px 40px 24px;min-height:60vh;">
            <h1 style="color:var(--primary);font-size:2.2rem;font-weight:700;margin-bottom:18px;text-align:center;letter-spacing:1px;">{% block page_title %}Bienvenido a Gestión de Pedidos{% endblock %}</h1>
            {% block content %}{% endblock %}
        </div>
    </section>
    <script>
    // Dinamismo: Cambia color de fondo al hacer scroll
    window.addEventListener('scroll', function() {
        if(window.scrollY > 30) {
            document.body.style.background = 'linear-gradient(120deg, #e0f2fe 0%, #f0fdf4 100%)';
        } else {
            document.body.style.background = 'linear-gradient(120deg, #f6f7fb 0%, #eef2ff 100%)';
        }
    });
    // Animación de navbar al hacer scroll
    const header = document.querySelector('header');
    window.addEventListener('scroll', function() {
        if(window.scrollY > 10) {
            header.style.boxShadow = '0 4px 16px #0002';
        } else {
            header.style.boxShadow = '0 2px 8px #0001';
        }
    });

    // --- ALERTA DE EXPIRACIÓN DE TOKEN JWT ---
    // Requiere que el frontend guarde el token y su expiración en localStorage/sessionStorage
    function getTokenExp() {
        // Busca en localStorage/sessionStorage la expiración del token (en segundos UNIX)
        let exp = localStorage.getItem('jwt_exp') || sessionStorage.getItem('jwt_exp');
        if (!exp) return null;
        return parseInt(exp, 10);
    }
    function showTokenExpireAlert(segRestantes) {
        let minutos = Math.floor(segRestantes / 60);
        let segundos = segRestantes % 60;
        let texto = '';
        if (minutos > 0) {
            texto = `Tu token de acceso expirará en ${minutos} minuto${minutos > 1 ? 's' : ''} y ${segundos} segundo${segundos !== 1 ? 's' : ''}. Guarda tu trabajo o renueva tu sesión.`;
        } else {
            texto = `Tu token de acceso expirará en ${segundos} segundo${segundos !== 1 ? 's' : ''}. Guarda tu trabajo o renueva tu sesión.`;
        }
        if (window.Swal) {
            Swal.fire({
                icon: 'warning',
                title: 'Tu sesión está por expirar',
                text: texto,
                confirmButtonText: 'Entendido',
                timer: 15000,
                timerProgressBar: true
            });
        } else {
            alert(texto);
        }
    }
    function setupTokenExpireWarning(forceShow) {
        let exp = getTokenExp();
        if (!exp) return;
        let now = Math.floor(Date.now() / 1000);
        let segRestantes = exp - now;
        let msToAlert = (exp - 60 - now) * 1000;
        if (forceShow) {
            showTokenExpireAlert(segRestantes);
        } else if (msToAlert > 0) {
            setTimeout(function() { showTokenExpireAlert(60); }, msToAlert);
        } else if (segRestantes > 0) {
            // Si ya está en la ventana de 1 minuto, alerta inmediatamente
            showTokenExpireAlert(segRestantes);
        }
    }
    setupTokenExpireWarning();
    </script>
</body>
</html>
