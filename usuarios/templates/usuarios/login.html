<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <style>
        body {
            background: linear-gradient(135deg, #0f766e 0%, #134e4a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .auth-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,.25);
            padding: 40px 48px;
            width: min(440px, 100%);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .auth-logo h1 {
            font-size: 1.5rem;
            color: #0f766e;
            margin: 0;
        }
        .auth-logo p {
            color: #64748b;
            font-size: 14px;
            margin: 4px 0 0;
        }
        .auth-card form p { margin-bottom: 14px; }
        .auth-card form p label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: .04em;
            margin-bottom: 5px;
        }
        .btn-block { width: 100%; justify-content: center; padding: 11px; font-size: 15px; margin-top: 6px; }
        .auth-footer { text-align: center; margin-top: 20px; font-size: 14px; color: #64748b; }
        .auth-footer a { color: #0f766e; font-weight: 600; text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }
        .error-list { background: #fee2e2; border-left: 4px solid #dc2626; color: #991b1b; padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 16px; list-style: none; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo">
            <h1>Gestión de Pedidos</h1>
            <p>Inicia sesión para continuar</p>
        </div>

        {% if form.non_field_errors %}
        <ul class="error-list">
            {% for error in form.non_field_errors %}
            <li>{{ error }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary btn-block">Iniciar sesión</button>
        </form>

        <div class="auth-footer">
            ¿No tienes cuenta? <a href="{% url 'register' %}">Regístrate</a>
        </div>
    </div>
</body>
</html>
