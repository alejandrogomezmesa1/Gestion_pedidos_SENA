<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <style>
        body {
            background: linear-gradient(135deg, #0f766e 0%, #134e4a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .auth-card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,.25);
            padding: 40px 48px;
            width: min(480px, 100%);
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .auth-logo h1 {
            font-size: 1.5rem;
            color: #0f766e;
            margin: 0;
        }
        .auth-logo p {
            color: #64748b;
            font-size: 14px;
            margin: 4px 0 0;
        }
        .auth-card form p { margin-bottom: 14px; }
        .auth-card form p label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: .04em;
            margin-bottom: 5px;
        }
        .helptext { font-size: 12px; color: #94a3b8; display: block; margin-top: 3px; }
        .errorlist { list-style: none; margin: 4px 0 0; padding: 0; }
        .errorlist li { font-size: 12px; color: #dc2626; }
        .btn-block { width: 100%; justify-content: center; padding: 11px; font-size: 15px; margin-top: 6px; }
        .auth-footer { text-align: center; margin-top: 20px; font-size: 14px; color: #64748b; }
        .auth-footer a { color: #0f766e; font-weight: 600; text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo">
            <h1>Gestión de Pedidos</h1>
            <p>Crea tu cuenta</p>
        </div>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary btn-block">Registrarse</button>
        </form>

        <div class="auth-footer">
            ¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión</a>
        </div>
    </div>
</body>
</html>
