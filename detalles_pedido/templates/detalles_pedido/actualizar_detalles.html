<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Editar Detalle</title></head>
<body>
    {% include 'partials/navbar.html' %}
    <div class="page-wrapper">
        <h1>Editar Detalle #{{ detalle_pedido.detallesId }}</h1>
        <div class="card">
            <form method="post">
                {% csrf_token %}
                {{ form.as_p }}
                <div class="form-actions">
                    <button type="submit" class="btn btn-warning">Guardar Cambios</button>
                    <a href="{% url 'listar_detalle_pedidos' %}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
