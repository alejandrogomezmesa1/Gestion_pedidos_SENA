<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Eliminar Pedido</title></head>
<body>
    {% include 'partials/navbar.html' %}
    <div class="page-wrapper">
        <h1>Eliminar Pedido</h1>
        <div class="card">
            <p class="mb-4">¿Confirmas que deseas eliminar el pedido <strong>#{{ pedido.pedidoId }}</strong> de <strong>{{ pedido.clienteId.nombre_cliente }}</strong>? Esta acción no se puede deshacer.</p>
            <form method="post">
                {% csrf_token %}
                <div class="form-actions">
                    <button type="submit" class="btn btn-danger">Sí, eliminar</button>
                    <a href="{% url 'listar_pedidos' %}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
