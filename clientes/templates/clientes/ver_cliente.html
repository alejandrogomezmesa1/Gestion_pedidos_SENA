<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Detalle Cliente</title></head>
<body>
    {% include 'partials/navbar.html' %}
    <div class="page-wrapper">
        <h1>Cliente #{{ cliente.clienteId }}</h1>
        <div class="card">
            <p><span class="text-muted">ID</span><br><strong>{{ cliente.clienteId }}</strong></p>
            <p><span class="text-muted">Nombre</span><br><strong>{{ cliente.nombre_cliente }}</strong></p>
            <p><span class="text-muted">Email</span><br><strong>{{ cliente.email }}</strong></p>
            <p><span class="text-muted">Dirección</span><br><strong>{{ cliente.dirección }}</strong></p>
            <p><span class="text-muted">Teléfono</span><br><strong>{{ cliente.teléfono }}</strong></p>
            <div class="form-actions">
                <a href="{% url 'actualizar_cliente' cliente.clienteId %}" class="btn btn-warning">Editar</a>
                <a href="{% url 'listar_clientes' %}" class="btn btn-secondary">Volver</a>
            </div>
        </div>
    </div>
</body>
</html>
