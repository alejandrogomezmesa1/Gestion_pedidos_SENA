<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><title>Detalle Cliente</title></head>
<body>
    {% include 'partials/navbar.html' %}
    <div class="page-wrapper">
        <h1>Cliente #{{ cliente.clienteId }}</h1>
        <div class="card">
            <p><span class="text-muted">ID</span><br><strong>{{ cliente.clienteId }}</strong></p>
            <p><span class="text-muted">Nombre</span><br><strong>{{ cliente.nombre_cliente }}</strong></p>
            <p><span class="text-muted">Email</span><br><strong>{{ cliente.email }}</strong></p>
            <p><span class="text-muted">Dirección</span><br><strong>{{ cliente.direccion }}</strong></p>
            <p><span class="text-muted">Teléfono</span><br><strong>{{ cliente.telefono }}</strong></p>
            <div class="form-actions">
                <a href="{% url 'actualizar_cliente' cliente.clienteId %}" class="btn btn-warning" title="Editar">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                        <path d="M15.502 1.94a1.5 1.5 0 0 1 0 2.12l-1.439 1.439-2.12-2.12 1.439-1.44a1.5 1.5 0 0 1 2.12 0zM14.061 5.439l-2.12-2.12L4.939 10.32a1.5 1.5 0 0 0-.378.684l-.805 2.414a.5.5 0 0 0 .632.632l2.414-.805a1.5 1.5 0 0 0 .684-.378l6.999-6.998z"/>
                    </svg>
                </a>
                <a href="{% url 'listar_clientes' %}" class="btn btn-secondary">Volver</a>
            </div>
        </div>
    </div>
</body>
</html>
