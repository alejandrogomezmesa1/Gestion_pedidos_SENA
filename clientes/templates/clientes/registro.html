{% extends 'base.html' %}
{% block navbar %}{% endblock %}
{% block title %}Registro{% endblock %}
{% block content %}
<div class="auth-form-wrapper">
    <h2>Crear cuenta</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Registrarse</button>
    </form>
    <p>¿Ya tienes cuenta? <a href="/login/">Inicia sesión</a></p>
</div>
{% endblock %}
